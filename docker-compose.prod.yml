services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: orthoandspinetools-postgres
    environment:
      POSTGRES_DB: orthoandspinetools
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - orthoandspinetools-network
    restart: unless-stopped
    shm_size: "256mb"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orthoandspinetools"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orthoandspinetools-backend
    env_file:
      - .env.cloudinary
    environment:
      NODE_ENV: production
      PORT: 3001
      # Pool limits per instance — lower connection_limit when running multiple backend replicas
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-secure_password_123}@postgres:5432/orthoandspinetools?connection_limit=10&pool_timeout=20
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this-in-production}
      JWT_EXPIRES_IN: 7d
      # Backend reads CORS_ORIGINS (plural); comma-separated. Defaults in code if unset.
      CORS_ORIGINS: https://orthoandspinetools.com,https://www.orthoandspinetools.com
      # Canonical origin for OG/HTML share previews (optional; else X-Forwarded-* from nginx)
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://orthoandspinetools.com}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - orthoandspinetools-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Same-origin /api (proxied by nginx to backend). Override only if API is on another host.
        VITE_API_URL: ${VITE_API_URL:-/api}
        # Canonical origin for SEO/JSON-LD at build time (browser still uses window.location when available).
        VITE_SITE_URL: ${VITE_SITE_URL:-https://orthoandspinetools.com}
        VITE_GA_MEASUREMENT_ID: ${VITE_GA_MEASUREMENT_ID:-G-2HVXSX6V78}
    container_name: orthoandspinetools-frontend
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - orthoandspinetools-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: orthoandspinetools-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - orthoandspinetools-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  orthoandspinetools-network:
    driver: bridge
